services:
  postgres:
    image: postgres:17-alpine
    container_name: astraread-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: astraread
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - astraread_postgres_data:/var/lib/postgresql/data

volumes:
  astraread_postgres_data:
